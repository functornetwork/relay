# Relay config for Railway (relay.yaml is gitignored, so this committed copy is
# baked into Dockerfile.railway as /app/relay.yaml). No secrets here — the
# mnemonic, funder key, and DB URL come from env vars at runtime.
server:
  address: 0.0.0.0
  port: 9119
  metrics_port: 9000
  max_connections: 5000
chains:
  97:
    # Production: replace with a reliable/paid BSC-testnet RPC.
    endpoint: "https://bsc-testnet.bnbchain.org"
    signers:
      num_signers: 3
    assets:
      bnb:
        address: "0x0000000000000000000000000000000000000000"
        fee_token: true
quote:
  constantRate: null
  gas:
    intentBuffer: 0
    txBuffer: 0
  ttl: 5
  rateTtl: 300
email:
  resendApiKey: null
  portoBaseUrl: null
transactions:
  max_pending_transactions: 100
  max_transactions_per_signer: 16
  max_queued_per_eoa: 1
  balance_check_interval: 5
  nonce_check_interval: 60
  transaction_timeout: 60
  public_node_endpoints: {}
orchestrator: 0xcb5cef3c54aa90e9a7ad602a258d3d360cc862b9
legacy_orchestrators: []
legacy_delegation_proxies: []
delegation_proxy: 0x4f4dde38da9f8abbb96c48ca520b992d4badc3d6
simulator: 0x3006de101e96e85272d5b5ad07a9738fa7678008
funder: 0xb248602eaadd9c3e2db4575c4e4d58003b7a2740
escrow: '0x0000000000000000000000000000000000000000'
fee_recipient: '0x6A75e80B961f7d884f9D03E5Aa0808d05e47c50d'
pricefeed:
  coingecko:
    remapping:
      bnb: "binancecoin"
database_url: null
